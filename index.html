];

const OBJECTIONS = [
  {tag:"Pricing",q:"\"We can get Commvault cheaper direct or through a reseller.\"",a:"Direct Commvault is software only. Add hardware, implementation, and ongoing management and the total cost is almost always higher than our subscription. We model this side-by-side — most prospects are surprised by the gap."},
  {tag:"Commvault",q:"\"We already own Commvault — why do we need Datastor?\"",a:"Owning Commvault licenses is different from running a production-grade backup program. Copilot and Pilot add the managed service layer — monitoring, recovery testing, reporting — that most teams can't provide in-house. You keep your investment; we make it work."},
  {tag:"Competitive",q:"\"We're already looking at Rubrik / Veeam.\"",a:"Both are solid platforms but neither offers a fully managed service on proven enterprise technology. The question is whether they want to own and operate the platform internally, or have a dedicated team do it under a single SLA. That's our differentiator."},
  {tag:"Timing",q:"\"We're not ready to make a change right now.\"",a:"Understood. Can we do a free backup health check in the meantime? We'll show you exactly where the gaps are so you have the data to build the case internally when the timing is right — no obligation."},
  {tag:"Cloud",q:"\"We're all-in on cloud — why not just use AWS or Azure Backup?\"",a:"Cloud-native backup leaves on-prem uncovered, has unpredictable egress costs on recovery, and typically doesn't satisfy compliance requirements for immutability or air-gap. Datastor closes those gaps without replacing what you have."},
  {tag:"Size",q:"\"We're too small for an enterprise solution like Commvault.\"",a:"Datastor makes Commvault's enterprise-grade protection accessible at any size through subscription. You're not buying an enterprise license — you're buying an outcome. The subscription scales to your environment."},
  {tag:"DIY",q:"\"We have an internal team — we can manage this ourselves.\"",a:"That's great. Our question is always: what does it cost in your team's time vs. having us do it? Backup is rarely anyone's primary job, and the consequences of getting it wrong are high. We're not replacing your team — we're protecting them."},
  {tag:"RTO/RPO",q:"\"We have RTO/RPO targets and we're confident we meet them.\"",a:"That's good to hear. When did you last do a full isolated cyber restore test — not just a file restore, but a full workload recovery in a clean environment? That's the only way to know for sure. If you have recent test results, we'd love to benchmark against what Datastor delivers."},
  {tag:"Support",q:"\"Our current vendor gives us support — we don't need a managed service.\"",a:"Vendor support and a managed service are very different things. Vendor support is reactive — you call them when something breaks. A managed service means someone is watching your environment 24/7, proactively catching issues, and owns the outcome. The real question is: who's responsible when something goes wrong at 2am?"}
];

let history=[], crumbs=[], curKey='start', selIdx=null, compFilter='All', objFilter='All';

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['discovery','competitive','objections'][i]===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='competitive') renderComp();
  if(t==='objections') renderObj();
}

function renderDisc() {
  const node = FLOW[curKey];
  const el = document.getElementById('tab-discovery');
  const step = history.length;
  let prog = '<div class="prog-row">';
  for(let i=0;i<Math.min(step+5,12);i++) prog+=`<div class="prog-pip ${i<step?'done':i===step?'active':''}"></div>`;
  prog+=`<span class="prog-label">Step ${step+1}</span></div>`;
  let insight = node.insight ? `<div class="insight-box"><div class="insight-eye">Rep note</div><div class="insight-text">${node.insight}</div></div>` : '';
  let opts = '<div class="opts">'+node.opts.map((o,i)=>`
    <button class="opt ${selIdx===i?'sel':''}" onclick="pick(${i})">
      <div class="opt-letter">${selIdx===i?'&#10003;':String.fromCharCode(65+i)}</div>
      <span class="opt-label">${o.label}</span>
    </button>`).join('')+'</div>';
  let nav = `<div class="nav">${history.length?'<button class="btn-back" onclick="goBack()">&#8592; Back</button>':''}<button class="btn-next ${selIdx!==null?'on':''}" onclick="advance()">Next &#8594;</button></div>`;
  el.innerHTML = prog+`<div style="margin-bottom:1.5rem"><div class="stage-eye">${node.stage}</div><div class="ask-text">${node.ask}</div></div>`+insight+opts+nav;
}

function renderResult(key) {
  const r = RESULTS[key];
  const el = document.getElementById('tab-discovery');
  let why = r.why.map(w=>`<div class="why-row"><div class="why-dot"></div><div class="why-text">${w}</div></div>`).join('');
  let steps = r.steps.map(s=>`<button class="step-btn ${s.pri?'pri':''}" onclick="alert('Next step: ${s.label}')"><strong>${s.label}</strong><span>${s.desc}</span></button>`).join('');
  el.innerHTML = `<div class="res-pill">Recommended solution</div>
    <div class="res-title">${r.title}</div>
    <div class="res-sub">${r.sub}</div>
    <hr class="divider">
    <div style="margin-bottom:1.25rem"><div class="res-eye">Why this fits</div>${why}</div>
    <div class="talk-box"><div class="talk-eye">Talk track</div><div class="talk-text">${r.talk}</div></div>
    <div style="margin-top:1.25rem"><div class="res-eye">Next steps</div><div class="steps-grid">${steps}</div></div>
    <button class="restart" onclick="restart()">&#8635; New discovery</button>`;
}

function renderComp() {
  const el = document.getElementById('tab-competitive');
  const names = ['All',...COMPETITORS.map(c=>c.name)];
  let filters = '<div class="comp-filters">'+names.map(n=>`<button class="comp-filter ${compFilter===n?'active':''}" onclick="setCompFilter('${n}')">${n}</button>`).join('')+'</div>';
  const list = compFilter==='All'?COMPETITORS:COMPETITORS.filter(c=>c.name===compFilter);
  let cards = list.map(c=>{
    let wins = c.wins.map(w=>`<div class="comp-row"><div class="comp-icon" style="color:#2d7a2d">&#10003;</div><div class="comp-text">${w}</div></div>`).join('');
    let watch = c.watch.map(w=>`<div class="comp-row"><div class="comp-icon" style="color:#b07800">&#9651;</div><div class="comp-text">${w}</div></div>`).join('');
    return `<div class="comp-card"><div class="comp-head" style="background:${c.bg};border-bottom:1px solid ${c.border}"><div class="comp-name" style="color:${c.tc}">${c.name}</div><div class="comp-type" style="color:${c.sc}">${c.type}</div></div><div class="comp-body"><div><div class="comp-col-eye" style="color:#2d7a2d">Datastor wins</div>${wins}</div><div><div class="comp-col-eye" style="color:#b07800">Watch out for</div>${watch}</div></div></div>`;
  }).join('');
  el.innerHTML = filters+cards;
}

function renderObj() {
  const el = document.getElementById('tab-objections');
  const tags = ['All',...new Set(OBJECTIONS.map(o=>o.tag))];
  let filters = '<div class="obj-filters">'+tags.map(t=>`<button class="obj-filter ${objFilter===t?'active':''}" onclick="setObjFilter('${t}')">${t}</button>`).join('')+'</div>';
  const list = objFilter==='All'?OBJECTIONS:OBJECTIONS.filter(o=>o.tag===objFilter);
  let cards = list.map(o=>`<div class="obj-card"><div class="obj-q">${o.q}</div><div class="obj-a">${o.a}</div></div>`).join('');
  el.innerHTML = filters+cards;
}

function setCompFilter(n){compFilter=n;renderComp();}
function setObjFilter(t){objFilter=t;renderObj();}
function pick(i){selIdx=i;renderDisc();}
function advance(){
  if(selIdx===null)return;
  const chosen=FLOW[curKey].opts[selIdx];
  crumbs.push(chosen.label);
  history.push({key:curKey,idx:selIdx,crumbs:[...crumbs]});
  selIdx=null;
  const next=chosen.next;
  if(RESULTS[next])renderResult(next);else{curKey=next;renderDisc();}
}
function goBack(){
  if(!history.length)return;
  const prev=history.pop();
  curKey=prev.key;selIdx=prev.idx;
  crumbs=history.length?[...history[history.length-1].crumbs]:[];
  renderDisc();
}
function restart(){history=[];crumbs=[];curKey='start';selIdx=null;renderDisc();}
renderDisc();
</script>
</body>
</html>
